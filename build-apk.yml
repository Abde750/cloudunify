name: Build Android APK

# Runs automatically on every push, and can also be triggered manually
# from the "Actions" tab on GitHub (the "Run workflow" button).
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # GitHub's ubuntu-latest runners come with the Android SDK
      # pre-installed, so no manual SDK download is needed here.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CloudUnify-Pro-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
